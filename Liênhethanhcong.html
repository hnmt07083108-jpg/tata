<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi thành công - Cảm ơn bạn!</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #fffaf5; /* Màu nền kem nhạt giống ảnh */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }

        .container {
            text-align: center;
            background: #fff;
            padding: 50px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            max-width: 500px;
            width: 90%;
        }

        .icon-box {
            width: 80px;
            height: 80px;
            background-color: #ff6600; /* Màu cam chủ đạo */
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            margin: 0 auto 20px;
        }

        h1 {
            color: #ff6600;
            text-transform: uppercase;
            font-size: 24px;
            margin-bottom: 10px;
        }

        p {
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn-back {
            background-color: #ff6600;
            color: white;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.3s ease;
            display: inline-block;
        }

        .btn-back:hover {
            background-color: #e65c00;
        }

        .contact-info {
            margin-top: 30px;
            font-size: 14px;
            color: #777;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="icon-box">
        ✓
    </div>
    <h1>Gửi Thành Công!</h1>
    <p>Cảm ơn bạn  đã để lại thông tin.<br>
    Chúng tôi đã nhận được lời nhắn và sẽ liên hệ tư vấn về các dòng mỹ phẩm cho bạn trong thời gian sớm nhất.</p>
    
    <a href="Trangchu.html" class="btn-back">QUAY LẠI TRANG CHỦ</a>

    <div class="contact-info">
        Hotline: 1900 123 456 | Email: Guardian@gmail.com
    </div>
</div>

</body>
</html>
